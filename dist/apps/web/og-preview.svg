<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="glow" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#1f1807" />
      <stop offset="50%" stop-color="#0d0a03" />
      <stop offset="100%" stop-color="#050505" />
    </radialGradient>
    
    <!-- Gold Text Gradient -->
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#B88A1A" />
      <stop offset="25%" stop-color="#D4AF37" />
      <stop offset="50%" stop-color="#FDF193" />
      <stop offset="75%" stop-color="#D4AF37" />
      <stop offset="100%" stop-color="#B88A1A" />
    </linearGradient>

    <!-- Font Imports -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600&amp;family=Inter:wght@400;500;600&amp;display=swap');
      
      .title { 
        font-family: 'Playfair Display', serif; 
        font-size: 88px; 
        font-weight: 700; 
        fill: url(#gold-grad); 
        filter: drop-shadow(0px 4px 12px rgba(0,0,0,0.8));
      }
      
      .subtitle { 
        font-family: 'Inter', sans-serif; 
        font-size: 24px; 
        font-weight: 500; 
        fill: #a1a1aa; 
        letter-spacing: 5px; 
        text-transform: uppercase; 
      }
    </style>
  </defs>

  <!-- Base Background -->
  <rect width="1200" height="630" fill="url(#glow)" />
  
  <!-- Subtle Luxury Grid Pattern -->
  <g stroke="#D4AF37" stroke-width="1" stroke-opacity="0.04">
    <path d="M 0 105 L 1200 105 M 0 210 L 1200 210 M 0 315 L 1200 315 M 0 420 L 1200 420 M 0 525 L 1200 525" />
    <path d="M 200 0 L 200 630 M 400 0 L 400 630 M 600 0 L 600 630 M 800 0 L 800 630 M 1000 0 L 1000 630" />
  </g>

  <!-- Decorative Borders -->
  <rect x="40" y="40" width="1120" height="550" fill="none" stroke="#D4AF37" stroke-width="2" stroke-opacity="0.25" rx="16" />
  <rect x="48" y="48" width="1104" height="534" fill="none" stroke="#D4AF37" stroke-width="1" stroke-opacity="0.1" rx="12" />

  <!-- App Logo / Visual (Centered) -->
  <!-- Adjusted to sit nicely above the typography -->
  <image href="https://horizons-cdn.hostinger.com/a59b9d69-2102-4bc6-8e97-afe4424699ca/4ee893c290d411ec85aff653f0863725.png" x="420" y="80" width="360" height="360" />

  <!-- Typography -->
  <text x="600" y="505" text-anchor="middle" class="title">Sums Up</text>
  <text x="600" y="555" text-anchor="middle" class="subtitle">Budget Calculator &amp; Financial Planning Tool</text>
</svg>