name: Release

on:
  push:
    tags:
      - 'v*'

env:
  POCKETBASE_VERSION: "0.22.21"

jobs:
  desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            pb_os: darwin_arm64
            pb_ext: ""
            name: macOS-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            pb_os: darwin_amd64
            pb_ext: ""
            name: macOS-x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            pb_os: windows_amd64
            pb_ext: ".exe"
            name: Windows

    runs-on: ${{ matrix.os }}
    name: Build ${{ matrix.name }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies
        run: npm install

      - name: Download PocketBase sidecar
        shell: bash
        run: |
          mkdir -p apps/web/src-tauri/binaries
          URL="https://github.com/pocketbase/pocketbase/releases/download/v${POCKETBASE_VERSION}/pocketbase_${POCKETBASE_VERSION}_${{ matrix.pb_os }}.zip"
          echo "Downloading $URL"
          curl -L -o pb.zip "$URL"
          unzip -o pb.zip -d pb_extract
          cp "pb_extract/pocketbase${{ matrix.pb_ext }}" "apps/web/src-tauri/binaries/pocketbase-${{ matrix.target }}${{ matrix.pb_ext }}"
          chmod +x "apps/web/src-tauri/binaries/pocketbase-${{ matrix.target }}${{ matrix.pb_ext }}" || true

      - name: Build web app
        run: npm run build --prefix apps/web

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/web
          args: --target ${{ matrix.target }}

  android:
    runs-on: ubuntu-latest
    name: Build Android

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: npm install

      - name: Build web app
        run: npm run build --prefix apps/web

      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli

      - name: Sync Capacitor
        run: npx cap sync android
        working-directory: apps/web

      - name: Setup keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.keystore
        working-directory: apps/web

      - name: Build APK
        run: ./gradlew assembleRelease
        working-directory: apps/web/android
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: apps/web/android/app/build/outputs/apk/release/*.apk

  ios:
    runs-on: macos-latest
    name: Build iOS
    if: vars.ENABLE_IOS_BUILD == 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build web app
        run: npm run build --prefix apps/web

      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli

      - name: Sync Capacitor
        run: npx cap sync ios
        working-directory: apps/web

      - name: Install Apple certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Build iOS app
        run: |
          xcodebuild -workspace apps/web/ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath $RUNNER_TEMP/App.xcarchive \
            archive

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: ${{ runner.temp }}/*.xcarchive
