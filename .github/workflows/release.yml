name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            name: macOS-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            name: macOS-x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: Windows

    runs-on: ${{ matrix.os }}
    name: Build ${{ matrix.name }}

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies
        run: npm install

      - name: Set version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Setting app version to $VERSION"
          node -e "
            const fs = require('fs');
            const path = 'apps/web/src-tauri/tauri.conf.json';
            const config = JSON.parse(fs.readFileSync(path, 'utf8'));
            config.version = '$VERSION';
            fs.writeFileSync(path, JSON.stringify(config, null, 2) + '\n');
          "

      - name: Build web app
        run: npm run build --prefix apps/web

      - name: Clear beforeBuildCommand for CI
        shell: bash
        run: |
          node -e "
            const fs = require('fs');
            const p = 'apps/web/src-tauri/tauri.conf.json';
            const c = JSON.parse(fs.readFileSync(p, 'utf8'));
            delete c.build.beforeBuildCommand;
            fs.writeFileSync(p, JSON.stringify(c, null, 2));
          "

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/web
          tagName: ${{ github.ref_name }}
          releaseName: "Sums Up ${{ github.ref_name }}"
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}
