name: Release

on:
  push:
    tags:
      - 'v*'

env:
  POCKETBASE_VERSION: "0.22.21"

jobs:
  desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            pb_os: darwin_arm64
            pb_ext: ""
            name: macOS-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            pb_os: darwin_amd64
            pb_ext: ""
            name: macOS-x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            pb_os: windows_amd64
            pb_ext: ".exe"
            name: Windows

    runs-on: ${{ matrix.os }}
    name: Build ${{ matrix.name }}

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies
        run: npm install

      - name: Download PocketBase sidecar
        shell: bash
        run: |
          mkdir -p apps/web/src-tauri/binaries
          URL="https://github.com/pocketbase/pocketbase/releases/download/v${POCKETBASE_VERSION}/pocketbase_${POCKETBASE_VERSION}_${{ matrix.pb_os }}.zip"
          echo "Downloading $URL"
          curl -L -o pb.zip "$URL"
          unzip -o pb.zip -d pb_extract
          cp "pb_extract/pocketbase${{ matrix.pb_ext }}" "apps/web/src-tauri/binaries/pocketbase-${{ matrix.target }}${{ matrix.pb_ext }}"
          chmod +x "apps/web/src-tauri/binaries/pocketbase-${{ matrix.target }}${{ matrix.pb_ext }}" || true

      - name: Build web app
        run: npm run build --prefix apps/web

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/web
          tagName: ${{ github.ref_name }}
          releaseName: "Sums Up ${{ github.ref_name }}"
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}
